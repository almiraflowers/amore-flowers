<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Вход в админ-панель | Amore Flowers</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ffd6e7,#ffeef5);
}

.login-box{
    width:400px;
    background:white;
    padding:40px;
    border-radius:20px;
    box-shadow:0 5px 20px rgba(0,0,0,0.15);
    text-align:center;
}

.logo{
    font-size:40px;
    margin-bottom:15px;
}

h1{
    color:#d63384;
    margin-bottom:25px;
}

input{
    width:100%;
    padding:14px;
    margin-bottom:15px;
    border:2px solid #f3c0d8;
    border-radius:10px;
    font-size:16px;
}

button{
    width:100%;
    padding:14px;
    background:#d63384;
    color:white;
    border:none;
    border-radius:10px;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#b8246d;
}

.error{
    color:red;
    margin-top:15px;
}

</style>
</head>

<body>

<div class="login-box">

    <div class="logo">🌷</div>

    <h1>Amore Flowers</h1>

    <input type="text" id="login" placeholder="Логин">

    <input type="password" id="password" placeholder="Пароль">

    <button onclick="checkLogin()">
        Войти
    </button>

    <p class="error" id="error"></p>

</div>

<script>

function checkLogin(){

    let login = document.getElementById("login").value;
    let password = document.getElementById("password").value;

    if(login === "admin" && password === "12345"){

        sessionStorage.setItem("admin","true");
window.location.href = "admin.html";
    }else{

        document.getElementById("error").innerHTML =
        "Неверный логин или пароль";

    }

}

</script>

</body>
</html>
