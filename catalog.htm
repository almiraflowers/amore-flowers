<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Каталог | Amore</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <a href="index.html" class="logo">
    <img src="image/лого.png" alt="Amore Flowers">
    <span>Amore Flowers</span>
</a>
    <nav>
        <a href="index.html">Главная</a>
        <a href="catalog.htm">Каталог</a>
        <a href="about.html">О нас</a>
        <a href="delivery.html">Доставка</a>
        <a href="contacts.html">Контакты</a>
    </nav>
</header>

<section class="section">
    <h2 class="title">Каталог цветов</h2>

    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Введите: роза, тюльпан, пион, лилия...">
        <button onclick="searchFlowers()">Найти</button>
    </div>

    <div class="categories">
        <button onclick="filterCategory('all')">Все</button>
        <button onclick="filterCategory('роза')">Розы</button>
        <button onclick="filterCategory('тюльпан')">Тюльпаны</button>
        <button onclick="filterCategory('пион')">Пионы</button>
        <button onclick="filterCategory('лилия')">Лилии</button>
        <button onclick="filterCategory('гортензия')">Гортензии</button>
        <button onclick="filterCategory('хризантема')">Хризантемы</button>
        <button onclick="filterCategory('букет')">Авторские букеты</button>
    </div>

    <div class="cards" id="cards"></div>
</section>

<div class="modal" id="flowerModal">
    <div class="modal-content">
        <span class="close" onclick="closeModal()">&times;</span>
        <h2 id="modalTitle"></h2>
        <p id="modalText"></p>
        <h3 id="modalPrice"></h3>
    </div>
</div>

<footer>
    © 2026 Amore Flowers
</footer>

<script src="script.js"></script>
</body>
</html>
